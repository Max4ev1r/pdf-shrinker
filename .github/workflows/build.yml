name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install pypdf pillow pyinstaller
      
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name PDFShrinker pdf_shrinker_v4.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFShrinker.exe
          path: dist/PDFShrinker.exe
          retention-days: 30
